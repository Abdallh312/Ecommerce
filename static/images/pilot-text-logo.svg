<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- PILOT Text in Outline Style -->
  <text x="200" y="60" text-anchor="middle" font-family="Arial Black, sans-serif" 
        font-size="48" font-weight="900" letter-spacing="8px"
        fill="none" stroke="url(#textGradient)" stroke-width="2">
    PILOT
  </text>
  
  <!-- Inner fill for better visibility -->
  <text x="200" y="60" text-anchor="middle" font-family="Arial Black, sans-serif" 
        font-size="48" font-weight="900" letter-spacing="8px"
        fill="url(#textGradient)" opacity="0.3">
    PILOT
  </text>
</svg>
